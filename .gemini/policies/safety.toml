# Safety Policy to prevent unintended file deletion during batch tasks.
# This ensures that even in YOLO mode, deletion commands require manual approval.

[[rule]]
toolName = "run_shell_command"
commandPrefix = ["rm", "del", "erase", "rmdir", "rd", "git rm"]
decision = "ask_user"
priority = 100

[[rule]]
toolName = "run_shell_command"
argsPattern = ".*(os\\.remove|os\\.unlink|shutil\\.rmtree).*"
decision = "ask_user"
priority = 100
